<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker - Dashboard</title>

  <!-- favicon add -->
  <link rel="shortcut icon" href="./assets/Aperture.png" type="image/x-icon">

  <!-- === tailwind Csss ==== -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- === Google Fonts: Geist === -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- ==== vanila css style === -->
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen mx-auto">

  <div class="bg-white p-10 rounded-lg shadow-lg sm:w-[20%] md:w-[45%] lg:w-[25%]">
    <!-- Logo -->
    <div class="mb-6 text-center">
      <img src="./assets/github-logo.png" alt="Logo" class="mx-auto w-20 h-20 mb-2" />
      <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

    <!-- Input fields -->
    <label for="username" class="text-sm pb-1 block">Username</label>
    <input id="username" type="text" placeholder="Enter Username"
      class="border border-gray-300 rounded-md p-2 w-full mb-3 focus:outline-none focus:ring-1 focus:ring-purple-600" />

    <label for="password" class="text-sm pb-1 block">Password</label>
    <input id="password" type="password" placeholder="Enter Password"
      class="border border-gray-300 rounded-md p-2 w-full mb-3 focus:outline-none focus:ring-1 focus:ring-purple-600" />

    <!-- Sign In Button -->
    <button onclick="login()"
      class="bg-blue-700 text-white rounded-md px-4 py-2 my-5 w-full hover:bg-purple-700 transition">Sign In</button>

    <!-- Demo Credentials -->
    <div class="mt-6 bg-gray-100 p-3 rounded text-sm text-gray-700 text-center">
      <p class="text-xs">Demo Credentials</p>
      <br>
      <p><strong>Username:</strong> admin</p>
      <p><strong>Password:</strong> admin123</p>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>

</html>
