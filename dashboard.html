<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>

    <!-- favicon add -->
    <link rel="shortcut icon" href="./assets/Open-Status.png" type="image/x-icon">

    <!-- === DaisyUI and tailwind Csss ==== -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- ==== Font awsome cdn ==== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- === Google Fonts: Giest === -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- ==== vanila css style === -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="mx-auto bg-[#F8FAFC]">

    <!-- Navbar -->
    <nav class="bg-white flex justify-between items-center p-4 shadow-sm">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="" class="w-1/9">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex space-x-2">
            <input id="searchInput" type="text" placeholder=" Search issues..."
                class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-purple-600" />
            <button onclick="searchIssue()"
                class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-purple-700 transition">
                <i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </nav>


    <!-- ================================= -->
    <!-- <div class="border-t-1 border-t-gray-200 py-1 space-y-2 text-gray-700">
        "assignee": "john_doe",
        "createdAt": "2024-01-18T11:00:00Z",
        "updatedAt": "2024-01-18T11:00:00Z"
        <p class="text-xs text-gray-500 mb-1"><strong>Status:</strong> ${issue.status}</p>
        <p class="text-xs text-gray-500 mb-1"><strong>Author:</strong> ${issue.author}</p>
        <p class="text-xs text-gray-500 mb-1"><strong>Priority:</strong> ${issue.priority}</p>
        <p class="text-xs text-gray-500"><strong>Label:</strong> ${issue.label}</p>
    </div> -->

    <!-- Tab btn section -->
    <section class="w-10/12 mx-auto bg-white p-4 flex space-x-4 shadow mt-4 rounded-lg">
        <button id="tab-all" class="tab-button bg-blue-700 text-white px-4 py-2 rounded w-25"
            onclick="switchTab('all')">All</button>
        <button id="tab-open" class="tab-button bg-gray-200 text-gray-700 px-4 py-2 rounded w-25"
            onclick="switchTab('open')">Open</button>
        <button id="tab-closed" class="tab-button bg-gray-200 text-gray-700 px-4 py-2 rounded w-25"
            onclick="switchTab('closed')">Closed</button>
    </section>

    <!-- Issue summary and filters -->
    <section class="w-10/12 mx-auto flex justify-between items-center bg-white p-4 mt-2 shadow">
        <div class="flex items-center space-x-3">
            <img src="./assets/Aperture.png" alt="">
            <div class="flex-col gap-1">
                <p class="font-semibold">
                    <span id="issue-count">0</span> Issues
                </p>
                <p class="text-sm text-gray-600">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center space-x-4 text-sm">
            <span><span class="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span>Open</span>
            <span><span class="inline-block w-3 h-3 rounded-full bg-purple-700 mr-1"></span>Closed</span>
        </div>
    </section>

    <!-- Loader -->
    <div id="loader" class="flex items-center justify-center text-center p-6 text-purple-700 font-semibold">
        <span class="loading loading-bars loading-xl"></span>
    </div>

    <!-- Issues Grid -->
    <section id="issuesContainer"
        class="w-10/12 mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 py-4">
    </section>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
        <div class="bg-white p-6 rounded-lg max-w-lg w-full relative">

            <h3 id="modalTitle" class="text-2xl font-semibold mb-2"></h3>
            <p id="modalDesc" class="mb-4 text-gray-700"></p>

            <p id="modalStatus" class="mb-1"></p>
            <p id="modalAuthor" class="mb-1"></p>
            <p id="modalPriority" class="mb-1"></p>
            <p id="modalLabel" class="mb-1"></p>
            <p id="modalDate" class="mb-4 text-sm text-gray-500"></p>

            <button onclick="closeModal()"
                class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 text-lg font-bold">&times;</button>

        </div>
    </div>

    <script src="./JS/file.js"></script>

</body>

</html>
